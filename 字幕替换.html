<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SRT字幕替换·行数对照工具（剪映专用）</title>
    <style>
        * {box-sizing: border-box;margin:0;padding:0;font-family:system-ui, "Microsoft YaHei", sans-serif}
        body {max-width:1300px;margin:30px auto;padding:0 20px;background:#f5f7fa}
        h1 {text-align:center;color:#111;margin-bottom:24px;font-size:22px}
        .top-row {display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px}
        .card {background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
        h3 {margin-bottom:12px;color:#222;font-size:17px;display:flex;justify-content:space-between;align-items:center}
        .count-tag {padding:4px 10px;border-radius:6px;font-size:14px;font-weight:bold}
        .count-green {background:#dcfce7;color:#166534}
        .count-red {background:#fee2e2;color:#b91c1c}
        input[type="file"] {width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px}
        textarea {width:100%;height:240px;padding:12px;border:1px solid #e2e8f0;border-radius:8px;resize:none;font-family:Consolas,monospace;font-size:13px;line-height:1.5}
        .tip {font-size:13px;color:#64748b;margin-top:6px}
        .compare-area {margin:24px 0}
        .compare-title {font-size:16px;margin-bottom:12px;color:#333}
        .compare-wrap {display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .compare-list {height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:10px;font-family:Consolas;font-size:13px;line-height:1.6}
        .compare-item {padding:4px 0;border-bottom:1px solid #f1f5f9}
        .btn-wrap {text-align:center;margin:28px 0}
        button {padding:13px 40px;background:#1677ff;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:0.2s}
        button:hover {background:#0d5ecd}
        .log-card .log {margin-top:10px;padding:12px;background:#f8fafc;border-radius:8px;font-size:13px;min-height:100px;white-space:pre-line}
    </style>
</head>
<body>
    <h1>剪映SRT字幕替换工具 | 实时行数对照校验</h1>

    <!-- 文件上传区域 -->
    <div class="top-row">
        <div class="card">
            <h3>
                1. 原始SRT字幕文件
                <span class="count-tag" id="srtCount">未上传</span>
            </h3>
            <input type="file" id="srtFile" accept=".srt">
            <div class="tip">剪映导出的srt，包含序号+时间轴+原文字幕</div>
            <textarea id="srtPreview" readonly placeholder="SRT完整预览..."></textarea>
        </div>
        <div class="card">
            <h3>
                2. 译文TXT文本文件
                <span class="count-tag" id="txtCount">未上传</span>
            </h3>
            <input type="file" id="txtFile" accept=".txt">
            <div class="tip">一行对应一条字幕，日文/韩文顺序一一匹配</div>
            <textarea id="txtPreview" readonly placeholder="译文完整预览..."></textarea>
        </div>
    </div>

    <!-- 新增：左右段落行数对照面板 -->
    <div class="card compare-area">
        <div class="compare-title">逐条字幕-译文对照预览（校验数量是否匹配）</div>
        <div class="compare-wrap">
            <div class="compare-list" id="srtCompareList">SRT字幕列表等待加载...</div>
            <div class="compare-list" id="txtCompareList">译文列表等待加载...</div>
        </div>
    </div>

    <!-- 执行按钮 -->
    <div class="btn-wrap">
        <button id="runBtn">执行字幕替换，下载新SRT文件</button>
    </div>

    <!-- 运行日志 -->
    <div class="card log-card">
        <h3>运行日志</h3>
        <div class="log" id="logBox">等待上传文件...</div>
    </div>

<script>
    const $ = s => document.querySelector(s);
    let srtRawText = "";
    let translateLines = [];
    let srtBlocks = [];

    // 更新数量标签颜色
    function refreshCountTag() {
        const srtNum = srtBlocks.length;
        const txtNum = translateLines.length;
        const srtTag = $("#srtCount");
        const txtTag = $("#txtCount");
        if (srtRawText) {
            srtTag.textContent = `字幕总数：${srtNum}`;
        } else {
            srtTag.textContent = "未上传";
        }
        if (translateLines.length > 0) {
            txtTag.textContent = `译文总行：${txtNum}`;
        } else {
            txtTag.textContent = "未上传";
        }
        // 颜色判断
        if (srtRawText && translateLines.length > 0) {
            if (srtNum === txtNum) {
                srtTag.className = "count-tag count-green";
                txtTag.className = "count-tag count-green";
            } else {
                srtTag.className = "count-tag count-red";
                txtTag.className = "count-tag count-red";
            }
        } else {
            srtTag.className = "count-tag";
            txtTag.className = "count-tag";
        }
        // 刷新左右对照列表
        renderCompareList();
    }

    // 渲染逐条对照列表
    function renderCompareList() {
        const srtListDom = $("#srtCompareList");
        const txtListDom = $("#txtCompareList");
        srtListDom.innerHTML = "";
        txtListDom.innerHTML = "";
        const maxLen = Math.max(srtBlocks.length, translateLines.length);
        for (let i = 0; i < maxLen; i++) {
            // SRT侧
            if (srtBlocks[i]) {
                const text = srtBlocks[i].slice(2).join(" ");
                srtListDom.innerHTML += `<div class="compare-item">${i+1}. ${text}</div>`;
            } else {
                srtListDom.innerHTML += `<div class="compare-item" style="color:#999">${i+1}. 无字幕</div>`;
            }
            // TXT译文侧
            if (translateLines[i] !== undefined) {
                txtListDom.innerHTML += `<div class="compare-item">${i+1}. ${translateLines[i]}</div>`;
            } else {
                txtListDom.innerHTML += `<div class="compare-item" style="color:#999">${i+1}. 无译文</div>`;
            }
        }
    }

    // 读取SRT文件
    $("#srtFile").addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsText(file, "utf-8");
        reader.onload = res => {
            srtRawText = res.target.result;
            $("#srtPreview").value = srtRawText.slice(0, 4000);
            // 解析分块
            srtBlocks = splitAllSrtBlocks(srtRawText);
            log(`✅ SRT加载完成，识别字幕共 ${srtBlocks.length} 条`);
            refreshCountTag();
        }
    })

    // 读取译文TXT
    $("#txtFile").addEventListener("change", e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsText(file, "utf-8");
        reader.onload = res => {
            const txtAll = res.target.result;
            translateLines = txtAll.split(/\r?\n/);
            $("#txtPreview").value = txtAll.slice(0, 4000);
            log(`✅ 译文加载完成，共 ${translateLines.length} 行译文`);
            refreshCountTag();
        }
    })

    // SRT标准分块解析（修复丢失字幕BUG）
    function splitAllSrtBlocks(text) {
        const rawBlocks = text.split(/\n\s*\n/);
        const blockArr = [];
        for (const raw of rawBlocks) {
            const lines = raw.split(/\r?\n/).filter(l => l.trim() !== "");
            if (lines.length >= 2) blockArr.push(lines);
        }
        return blockArr;
    }

    // 生成完整替换后的SRT文本
    function buildNewSrt(blocks, transArr) {
        const final = [];
        for (let i = 0; i < blocks.length; i++) {
            const blk = blocks[i];
            const num = blk[0];
            const time = blk[1];
            const newText = i < transArr.length ? transArr[i] : "";
            final.push([num, time, newText].join("\n"));
        }
        return final.join("\n\n");
    }

    // 文件下载
    function downloadFile(content, name) {
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
    }

    // 日志打印
    function log(msg) {
        $("#logBox").innerHTML += msg + "\n";
        $("#logBox").scrollTop = $("#logBox").scrollHeight;
    }

    // 替换执行按钮
    $("#runBtn").addEventListener("click", () => {
        $("#logBox").innerHTML = "";
        if (!srtRawText) return log("❌ 请先上传原始SRT字幕文件");
        if (translateLines.length === 0) return log("❌ 请先上传译文TXT文件");

        const subTotal = srtBlocks.length;
        const txtTotal = translateLines.length;
        log(`📊 字幕总数：${subTotal} | 译文行数：${txtTotal}`);
        if (subTotal !== txtTotal) {
            log(`⚠️ 数量不匹配！导出后缺少译文的字幕会显示空白文字`);
        } else {
            log(`✅ 数量完全匹配，替换无错位风险`);
        }
        const newSrt = buildNewSrt(srtBlocks, translateLines);
        downloadFile(newSrt, "替换后字幕.srt");
        log("🎉 全部字幕替换完毕，文件已自动下载，可直接导入剪映");
    })
</script>
</body>
</html>
